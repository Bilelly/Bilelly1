name: Daily Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate random commits
        run: |
          RANDOM_NUM=$((RANDOM % 8 + 1))
          echo "Generating $RANDOM_NUM commits..."
          
          for i in $(seq 1 $RANDOM_NUM); do
            echo "Update $i at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> updates.txt
            git add updates.txt
            git commit -m "Daily update commit #$i - $(date -u '+%Y-%m-%d')" || true
          done
          
          git push
