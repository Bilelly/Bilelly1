name: Daily Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update README with current date
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          if grep -q "<!-- DAILY-UPDATE:START -->" README.md; then
            sed -i "/<!-- DAILY-UPDATE:START -->/a\
          📅 Last update: $DATE" README.md
          else
            echo "" >> README.md
            echo "<!-- DAILY-UPDATE:START -->" >> README.md
            echo "📅 Last update: $DATE" >> README.md
            echo "<!-- DAILY-UPDATE:END -->" >> README.md
          fi
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: daily update - $(date -u '+%Y-%m-%d')" || echo "No changes"
          git push
